<div class="page">
  <div class="page-header">
    <h1 class="page-title" data-i18n="dashboard.greeting">Dashboard</h1>
    <p class="page-subtitle" data-i18n="dashboard.subtitle">Your training at a glance</p>
  </div>

  <!-- Stats Grid -->
  <div class="stats-grid">
    <div class="stat-card accent">
      <div class="stat-value" id="stat-sets-week">-</div>
      <div class="stat-label" data-i18n="dashboard.sets_this_week">Sets this week</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-total-sets">-</div>
      <div class="stat-label" data-i18n="dashboard.total_sets">Total sets</div>
    </div>
    <div class="stat-card success">
      <div class="stat-value" id="stat-weight">-</div>
      <div class="stat-label" data-i18n="dashboard.body_weight">Body weight</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-exercises">-</div>
      <div class="stat-label" data-i18n="dashboard.exercises_count">Exercises</div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="quick-actions">
    <a href="#log" class="quick-action">
      <span class="quick-action-icon amber">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </span>
      <span data-i18n="workout.title">Log</span>
    </a>
    <a href="#measurements" class="quick-action">
      <span class="quick-action-icon green">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
      </span>
      <span data-i18n="measurements.title">Body</span>
    </a>
    <a href="#progress" class="quick-action">
      <span class="quick-action-icon blue">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
      </span>
      <span data-i18n="progress.title">Progress</span>
    </a>
  </div>

  <!-- Recent PRs -->
  <div class="section">
    <div class="section-title" data-i18n="dashboard.personal_records">Personal Records</div>
    <div class="list" id="pr-list">
      <div class="empty-state" style="padding:24px">
        <div class="empty-state-text text-dim" data-i18n="dashboard.no_workouts">No workouts yet. Start logging!</div>
      </div>
    </div>
  </div>

</div>
