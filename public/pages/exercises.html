<div class="page">
  <div class="page-header">
    <h1 class="page-title" data-i18n="exercises.title">Exercises</h1>
    <p class="page-subtitle" data-i18n="exercises.subtitle">Manage your exercise library.</p>
  </div>

  <!-- Search -->
  <div class="form-group">
    <input type="text" id="exercises-search" class="form-input" data-i18n-placeholder="exercises.name_placeholder" placeholder="Search exercises...">
  </div>

  <!-- Add Exercise -->
  <div class="flex gap-sm mb">
    <input type="text" id="exercise-name-input" class="form-input" data-i18n-placeholder="exercises.name_placeholder" placeholder="Exercise name" style="flex:1">
    <button id="exercise-add-btn" class="btn btn-primary">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>

  <!-- Exercise List -->
  <div class="list" id="exercises-list">
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
  </div>
</div>
