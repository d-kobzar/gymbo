<div class="page">
  <div class="page-header">
    <h1 class="page-title" data-i18n="workout.page_title">Workout</h1>
    <p class="page-subtitle" data-i18n="workout.subtitle">Record every set. Track your progression.</p>
  </div>

  <!-- Date Picker -->
  <div class="form-group">
    <label class="form-label" data-i18n="workout.date">Date</label>
    <input type="date" id="log-date" class="form-input">
  </div>

  <!-- Exercise Selector -->
  <div class="form-group">
    <label class="form-label" data-i18n="workout.exercise">Exercise</label>
    <select id="log-exercise" class="form-select">
      <option value="" data-i18n="workout.select_exercise">Select exercise</option>
    </select>
  </div>

  <!-- Set Input Row -->
  <div class="input-row mb">
    <div class="form-group">
      <label class="form-label" data-i18n="workout.reps">Reps</label>
      <input type="number" id="log-reps" class="input-compact" placeholder="10" inputmode="numeric" min="1">
    </div>
    <div class="form-group">
      <label class="form-label" data-i18n="workout.weight">Weight (kg)</label>
      <input type="number" id="log-weight" class="input-compact" placeholder="60" inputmode="decimal" min="0" step="0.5">
    </div>
    <div class="form-group">
      <label class="form-label" data-i18n="workout.rir">RIR</label>
      <input type="number" id="log-rir" class="input-compact" placeholder="2" inputmode="numeric" min="0" max="10">
    </div>
  </div>

  <!-- Add Button -->
  <button id="log-add-btn" class="btn btn-primary btn-block mb">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    <span data-i18n="workout.add_set">Add Set</span>
  </button>

  <!-- Rest Timer -->
  <div class="flex-between mb">
    <div class="flex gap-sm" style="align-items:center">
      <label class="form-label" style="margin:0" data-i18n="workout.rest_timer">Rest timer</label>
      <select id="rest-seconds" class="form-select" style="width:80px;height:36px;font-size:13px">
        <option value="60">60s</option>
        <option value="90" selected>90s</option>
        <option value="120">120s</option>
        <option value="150">150s</option>
        <option value="180">180s</option>
        <option value="240">240s</option>
        <option value="300">300s</option>
      </select>
    </div>
    <button id="rest-timer-btn" class="btn btn-outline btn-sm">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span data-i18n="workout.rest">Rest</span>
    </button>
  </div>

  <div class="divider"></div>

  <!-- Today's Workout Log -->
  <div class="section">
    <div class="section-title" data-i18n="workout.workout_log">Workout Log</div>
    <div id="log-entries">
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>
  </div>
</div>

<!-- Rest Timer Overlay -->
<div class="rest-overlay" id="rest-overlay">
  <div class="rest-timer-label" data-i18n="workout.rest">REST</div>
  <svg class="rest-timer-ring" viewBox="0 0 200 200">
    <circle class="ring-bg" cx="100" cy="100" r="90"/>
    <circle class="ring-progress" cx="100" cy="100" r="90"/>
  </svg>
  <div class="rest-timer-display">1:30</div>
  <button class="btn btn-ghost mt" onclick="document.getElementById('rest-overlay').classList.remove('active');clearInterval(window._restInterval)" data-i18n="common.close">Close</button>
</div>
