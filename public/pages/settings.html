<div class="page">
  <div class="page-header">
    <h1 class="page-title" data-i18n="settings.title">Settings</h1>
  </div>

  <!-- Language -->
  <div class="section">
    <div class="section-title" data-i18n="settings.language">Language</div>
    <div class="lang-pills">
      <button class="lang-pill" data-lang="en">English</button>
      <button class="lang-pill" data-lang="ua">Українська</button>
      <button class="lang-pill" data-lang="ru">Русский</button>
    </div>
  </div>

  <!-- Theme -->
  <div class="section">
    <div class="section-title" data-i18n="dashboard.theme">Theme</div>
    <div class="list">
      <div class="setting-row">
        <span class="setting-label">Dark / Light</span>
        <label class="toggle">
          <input type="checkbox" id="setting-theme">
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>
  </div>

  <!-- Notifications -->
  <div class="section">
    <div class="section-title" data-i18n="settings.notifications">Notifications</div>
    <div class="list">
      <div class="setting-row">
        <span class="setting-label" data-i18n="settings.training_reminder">Training reminders</span>
        <label class="toggle">
          <input type="checkbox" id="setting-training-reminder">
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="setting-row">
        <span class="setting-label" data-i18n="settings.training_time">Training time</span>
        <input type="time" id="setting-training-time" class="form-input" style="width:110px;height:36px;font-size:14px;text-align:center" value="18:00">
      </div>
      <div class="setting-row">
        <span class="setting-label" data-i18n="settings.measurement_reminder">Measurement reminders</span>
        <label class="toggle">
          <input type="checkbox" id="setting-measurement-reminder">
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>
  </div>

  <!-- Data -->
  <div class="section">
    <div class="section-title" data-i18n="dashboard.backup">Data</div>
    <div class="list">
      <div class="setting-row">
        <span class="setting-label" data-i18n="dashboard.import_data">Import Data</span>
        <label class="btn btn-outline btn-sm" style="cursor:pointer">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          JSON
          <input type="file" id="import-file" accept=".json" style="display:none">
        </label>
      </div>
      <div class="setting-row">
        <span class="setting-label" data-i18n="dashboard.export_data">Export Data</span>
        <button id="export-btn" class="btn btn-outline btn-sm">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          JSON
        </button>
      </div>
    </div>
  </div>

  <div class="text-center mt-lg mb-lg">
    <span class="text-dim text-sm">GymBo v2.0</span>
  </div>
</div>
